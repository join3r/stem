name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    # macOS runner: Stem is an Electron/macOS app, and the Playwright E2E layer
    # launches a headed Electron window (no xvfb needed on macOS).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # node:sqlite (used by the recall store) is available flag-free on 24+.
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: E2E tests (Playwright + Electron)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
